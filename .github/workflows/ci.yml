name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: logica
          POSTGRES_PASSWORD: logica
          POSTGRES_DB: logica_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U logica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://logica:logica@localhost:5432/logica_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-please-change-in-real-deploys-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --dev
      # WeasyPrint (RF-16 exportación a PDF) needs these system libs — see
      # apps/api/Dockerfile, same packages installed there for prod images.
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info
      - run: uv run alembic upgrade head
      - run: uv run pytest -m "not sandbox and not live" --cov=logica --cov-report=term-missing

  evals:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: logica
          POSTGRES_PASSWORD: logica
          POSTGRES_DB: logica_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U logica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://logica:logica@localhost:5432/logica_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-please-change-in-real-deploys-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run alembic upgrade head
      - run: uv run pytest tests/evals -m "not live"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npx tsc -b
      - run: npm run test -- --run
      - run: npm run build
