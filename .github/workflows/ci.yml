name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: apps/api

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: logica
          POSTGRES_PASSWORD: logica
          POSTGRES_DB: logica_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U logica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://logica:logica@localhost:5432/logica_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-please-change-in-real-deploys-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run alembic upgrade head
      - run: uv run pytest -m "not sandbox and not live" --cov=logica --cov-report=term-missing

  evals:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: logica
          POSTGRES_PASSWORD: logica
          POSTGRES_DB: logica_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U logica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://logica:logica@localhost:5432/logica_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-please-change-in-real-deploys-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --dev
      - run: uv run alembic upgrade head
      - run: uv run pytest tests/evals -m "not live"
